<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm E-commerce</title>
</head>
<body>
    <h1>Giới thiệu iPhone 16 Series</h1>

    <audio controls>
        <source src="/PBT_02/audio/bgm.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ thẻ audio.
    </audio>

    <section>
        <h2>Hình ảnh sản phẩm</h2>
        <figure>
            <img src="/PBT_02/image/ip16trang.jpg" alt="iPhone 16 màu trắng" loading="lazy" style="max-width: 3%; height: auto;">
            <figcaption>iPhone 16 - Trắng Tinh Khôi</figcaption>
        </figure>
        <figure>
            <img src="/PBT_02/image/ip16titan.jpg" alt="iPhone 16 Pro Titan" loading="lazy" style="max-width: 5%; height: auto;">
            <figcaption>iPhone 16 Pro - Titan Tự Nhiên</figcaption>
        </figure>
        <figure>
            <img src="/PBT_02/image/ip16.jpg" alt="Cụm camera iPhone 16" loading="lazy" style="max-width: 5%; height: auto;">
            <figcaption>Hệ thống camera siêu đỉnh</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video Đánh Giá</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/DPENsCY6WyE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        
        <br><br>
        <video controls poster="/PBT_02/image/thumbnail.png" width="600">
            <source src="/PBT_02/video/review.mp4" type="video/mp4">
            <source src="review.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </section>

    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="orange" />
        <text x="50" y="55" font-family="Arial" font-size="20" fill="white" text-anchor="middle">LOGO</text>
    </svg>
</body>
</html>
